<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TMSAHFF STORE</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body{font-family:Cairo,sans-serif;background:#050505;color:#fff}
.glass{background:rgba(25,25,25,.8);backdrop-filter:blur(10px);border:1px solid #333}
.modal{display:none;position:fixed;inset:0;background:#000b;align-items:center;justify-content:center}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:none}
</style>
</head>
<body class="p-6">
<div class="max-w-5xl mx-auto">
<div class="glass rounded-3xl p-6 flex justify-between items-center">
<div><h1 class="text-3xl font-bold">TMSAHFF STORE</h1><p class="text-gray-400">نظام متابعة الطلبات</p></div>
<div class="flex gap-4 text-2xl">
<a href="https://botrix.live/k/tmsahff/shop" target="_blank" title="BotRix"><i class="fas fa-store text-pink-500"></i></a>
<a href="https://wa.me/201010247318" target="_blank"><i class="fab fa-whatsapp text-green-500"></i></a>
<a href="https://www.tiktok.com/@tmsahfreefire" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="https://instagram.com/tmsahtv" target="_blank"><i class="fab fa-instagram text-pink-400"></i></a>
<a href="https://kick.com/tmsahff" target="_blank"><i class="fas fa-video text-green-400"></i></a>
</div></div>

<div class="glass rounded-2xl p-3 mt-6 flex gap-2">
<input id="userInput" class="flex-1 bg-transparent outline-none p-2" placeholder="اكتب اليوزر">
<button onclick="search()" class="bg-pink-600 px-6 rounded-xl">بحث</button>
</div>
<div id="results" class="mt-6 space-y-4"></div>
</div>

<div id="actionModal" class="modal">
<div class="glass p-6 rounded-3xl w-[420px]">
<h2 id="modalTitle" class="text-xl font-bold mb-3"></h2>
<textarea id="modalNote" class="w-full h-32 bg-neutral-900 rounded p-3" placeholder="اكتب السبب أو التعديل..."></textarea>
<div class="flex justify-end gap-2 mt-4">
<button onclick="closeModal()" class="px-4 py-2 bg-gray-700 rounded">إلغاء</button>
<button id="confirmBtn" class="px-4 py-2 bg-pink-600 rounded">إرسال</button>
</div>
</div></div>

<div id="toast" class="toast bg-green-600 px-6 py-3 rounded-xl">تم إرسال الطلب بنجاح.</div>

<script>
const WEBHOOK="ضع_رابط_الويب_هوك_هنا";

async function search(){
const user=document.getElementById("userInput").value.trim();
if(!user){showToast("اكتب اليوزر أولاً");return;}
const res=document.getElementById("results");
res.innerHTML=`<div class="glass p-5 rounded-2xl flex justify-between items-center">
<div><b>${user}</b><div class="text-gray-400 text-sm">طلب تجريبي</div></div>
<div class="flex gap-2">
<button onclick="openModal('🚀 طلب استعجال','طلب تجريبي')" class="bg-blue-700 px-3 py-2 rounded">استعجال</button>
<button onclick="openModal('✏️ طلب تعديل','طلب تجريبي')" class="bg-yellow-600 px-3 py-2 rounded">تعديل</button>
<button onclick="openModal('❌ طلب إلغاء','طلب تجريبي')" class="bg-red-700 px-3 py-2 rounded">إلغاء</button>
</div></div>`;
}

function openModal(type,order){
modalTitle.innerText=type;
actionModal.style.display="flex";
confirmBtn.onclick=()=>sendDiscord(type,order,modalNote.value);
}
function closeModal(){actionModal.style.display="none";modalNote.value=""}
function showToast(t){toast.innerText=t;toast.style.display="block";setTimeout(()=>toast.style.display="none",2200);}
function sendDiscord(type,order,note){
fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({embeds:[{title:type,color:16711845,fields:[
{name:"👤 المستخدم",value:userInput.value||"-"},
{name:"📦 الطلب",value:order},
{name:"📝 التفاصيل",value:note||"لا يوجد"},
{name:"🕒 الوقت",value:new Date().toLocaleString("ar-EG")}
]}]})}).finally(()=>{closeModal();showToast("تم إرسال الطلب للإدارة.");});
}
</script>
</body>
</html>
