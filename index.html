<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TMSAHFF STORE | البث المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; }
        .bg-glow { background: radial-gradient(circle at top right, #1d030b, #050505); }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid #333; }
        /* تصميم زر كيك */
        .kick-live { border: 1px solid #53fc18; box-shadow: 0 0 10px #53fc1866; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(83, 252, 24, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(83, 252, 24, 0); } 100% { box-shadow: 0 0 0 0 rgba(83, 252, 24, 0); } }
        .modal { display: none; position: fixed; inset: 0; background: #000d; z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-glow min-h-screen p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- الجزء العلوي مع حالة البث -->
    <div class="glass rounded-3xl p-8 mb-8 text-center border-b-4 border-pink-600">
        <h1 class="text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">TMSAHFF STORE</h1>
        <div class="flex justify-center mt-6">
            <a href="https://kick.com/tmsahff" class="kick-live flex items-center gap-3 bg-black px-6 py-3 rounded-full hover:bg-[#53fc18]/10 transition">
                <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                <span class="font-bold text-[#53fc18]">KICK LIVE - 24/7</span>
                <span class="text-white">| TMSAHFF</span>
            </a>
        </div>
    </div>

    <!-- البحث -->
    <div class="glass p-6 rounded-2xl flex gap-4 mb-8 border border-neutral-800">
        <input id="userInput" class="flex-1 bg-transparent p-3 outline-none text-white text-lg" placeholder="ابحث باسمك في النظام...">
        <button onclick="search()" class="bg-pink-600 px-10 py-3 rounded-xl font-black hover:bg-pink-700 transition">بحث</button>
    </div>

    <!-- الجدول -->
    <div class="glass overflow-x-auto rounded-2xl border border-neutral-800">
        <table class="w-full text-right border-collapse">
            <thead>
                <tr class="text-neutral-500 border-b border-neutral-800 text-sm">
                    <th class="p-6">الطلب</th>
                    <th class="p-6">الايدي/النص</th>
                    <th class="p-6">التكلفة</th>
                    <th class="p-6">الحالة</th>
                    <th class="p-6">إجراءات</th>
                </tr>
            </thead>
            <tbody id="results"></tbody>
        </table>
    </div>
</div>

<div id="actionModal" class="modal">
    <div class="glass p-8 rounded-3xl w-96 border border-pink-500/30">
        <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>
        <p id="modalDesc" class="text-sm text-neutral-400 mb-6"></p>
        <textarea id="modalNote" class="hidden w-full h-24 bg-black p-4 rounded-xl border border-neutral-700 outline-none mb-6" placeholder="اكتب التفاصيل..."></textarea>
        <div class="flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-3 bg-neutral-800 rounded-xl">إغلاق</button>
            <button id="confirmBtn" class="flex-1 py-3 bg-pink-600 rounded-xl font-bold">تأكيد</button>
        </div>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const user = document.getElementById('userInput').value.trim().toLowerCase();
        const res = document.getElementById('results');
        if (!user) return;
        
        try {
            const response = await fetch('data.csv');
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);
            let html = '';

            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                if (cols && cols[0].replace(/"/g, '').trim().toLowerCase().includes(user)) {
                    const article = cols[1]?.replace(/"/g, '');
                    const message = cols[2]?.replace(/"/g, '');
                    const price = `${cols[3]} ${cols[4]}`;
                    const statusRaw = cols[6]?.trim();
                    const status = statusRaw === 'Delivered' ? '✅ تم التوصيل' : '⏳ قيد الشحن';

                    html += `
                    <tr class="border-b border-neutral-800 hover:bg-white/5 transition">
                        <td class="p-6 font-bold text-lg">${article}</td>
                        <td class="p-6 text-neutral-400">${message}</td>
                        <td class="p-6">${price}</td>
                        <td class="p-6 ${statusRaw === 'Delivered' ? 'text-green-500' : 'text-yellow-500'} font-bold">${status}</td>
                        <td class="p-6 flex gap-2">
                            ${statusRaw === 'Pending' ? `
                                <button onclick="prepareAction('استعجال', '${article}')" class="bg-blue-900/80 px-4 py-2 rounded-lg text-xs hover:bg-blue-700">استعجال</button>
                                <button onclick="prepareAction('تعديل', '${article}')" class="bg-yellow-700/80 px-4 py-2 rounded-lg text-xs hover:bg-yellow-600">تعديل</button>
                                <button onclick="prepareAction('إلغاء', '${article}')" class="bg-red-900/80 px-4 py-2 rounded-lg text-xs hover:bg-red-700">إلغاء</button>
                            ` : `<button onclick="sendAction('تقييم', '${article}', 'تم تقييم الطلب')" class="bg-purple-900/80 px-6 py-2 rounded-lg text-xs hover:bg-purple-700">⭐ تقييم</button>`}
                        </td>
                    </tr>`;
                }
            });
            res.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center text-red-500">لا توجد بيانات لهذا اليوزر</td></tr>';
        } catch (e) { alert("حدث خطأ أثناء تحميل الملف."); }
    }

    function prepareAction(type, order) {
        document.getElementById('modalTitle').innerText = 'تأكيد: ' + type;
        const noteArea = document.getElementById('modalNote');
        const desc = document.getElementById('modalDesc');
        noteArea.classList.add('hidden');
        if (type === 'تعديل') { desc.innerText = "اكتب التفاصيل الجديدة:"; noteArea.classList.remove('hidden'); }
        else if (type === 'إلغاء') desc.innerText = "هل تود الإلغاء واسترجاع النقاط؟";
        else desc.innerText = "تأكيد " + type + " الطلب؟";
        
        document.getElementById('actionModal').style.display = 'flex';
        document.getElementById('confirmBtn').onclick = () => sendAction(type, order, noteArea.value);
    }

    async function sendAction(type, order, note) {
        const payload = { embeds: [{ title: `🔔 إجراء: ${type}`, color: 16711680, fields: [{ name: "اليوزر", value: document.getElementById('userInput').value }, { name: "الطلب", value: order }, { name: "ملاحظات", value: note || "لا يوجد" }] }] };
        try {
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("تم إرسال الطلب بنجاح!");
        } catch (e) { alert("فشل الإرسال، تحقق من الاتصال."); }
        closeModal();
    }

    function closeModal() { document.getElementById('actionModal').style.display = 'none'; }
</script>
</body>
</html>
