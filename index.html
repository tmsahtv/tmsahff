<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMSAHFF STORE | النظام الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(12px); border: 1px solid #333; }
        .modal { display: none; position: fixed; inset: 0; background: #000d; z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <div class="glass rounded-3xl p-8 border-b-4 border-pink-600 mb-8 text-center">
        <h1 class="text-4xl font-black italic">TMSAHFF STORE</h1>
        <p class="text-neutral-500 font-bold mt-2">نظام الإدارة والتحكم الاحترافي</p>
        
        <div class="flex flex-wrap gap-6 justify-center mt-8 text-2xl">
            <a href="https://botrix.live/k/tmsahff/shop" class="hover:text-pink-500 transition"><i class="fas fa-store"></i></a>
            <a href="https://wa.me/201010247318" class="hover:text-green-500 transition"><i class="fab fa-whatsapp"></i></a>
            <a href="https://tiktok.com/@tmsahfreefire" class="hover:text-white transition"><i class="fab fa-tiktok"></i></a>
            <a href="https://instagram.com/tmsahtv" class="hover:text-pink-400 transition"><i class="fab fa-instagram"></i></a>
            <a href="https://kick.com/tmsahff" class="hover:text-green-400 transition"><i class="fas fa-video"></i></a>
        </div>
    </div>

    <div class="glass p-4 rounded-2xl flex gap-2 mb-8">
        <input id="userInput" class="flex-1 bg-transparent p-3 outline-none" placeholder="أدخل اليوزر الخاص بك...">
        <button onclick="search()" class="bg-pink-600 px-8 rounded-xl font-bold hover:bg-pink-700 transition">بحث عن طلباتي</button>
    </div>

    <div class="glass px-6 py-3 rounded-2xl mb-4 grid grid-cols-4 text-center text-sm font-bold text-neutral-500">
        <div>الطلب</div>
        <div>التاريخ</div>
        <div>الحالة</div>
        <div>الإجراءات</div>
    </div>
    <div id="results" class="space-y-4"></div>
</div>

<div id="actionModal" class="modal">
    <div class="glass p-6 rounded-3xl w-96 border border-pink-500/30">
        <h2 id="modalTitle" class="text-xl font-bold mb-4"></h2>
        <p id="modalDesc" class="text-xs text-neutral-400 mb-4"></p>
        <textarea id="modalNote" class="w-full h-24 bg-neutral-900 p-3 rounded-xl border border-neutral-700 outline-none mb-4" placeholder="اكتب ملاحظاتك..."></textarea>
        <div class="flex gap-2">
            <button onclick="closeModal()" class="flex-1 py-2 bg-neutral-800 rounded-xl">إغلاق</button>
            <button id="confirmBtn" class="flex-1 py-2 bg-pink-600 rounded-xl font-bold">تأكيد الإجراء</button>
        </div>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const user = document.getElementById('userInput').value.trim();
        const res = document.getElementById('results');
        if (!user) { alert("أدخل اليوزر أولاً"); return; }
        
        res.innerHTML = '<p class="text-center text-neutral-500">جاري البحث...</p>';

        try {
            const response = await fetch('data.csv');
            const data = await response.text();
            const rows = data.split('\n');
            let html = '';

            rows.forEach(row => {
                const cols = row.split(',');
                // ترتيب الأعمدة: 0=اليوزر، 1=الطلب، 2=التاريخ، 3=الحالة
                if (cols[0] && cols[0].trim().toLowerCase() === user.toLowerCase()) {
                    const orderName = cols[1] ? cols[1].trim() : 'طلب';
                    const date = cols[2] ? cols[2].trim() : '-';
                    const status = cols[3] ? cols[3].trim() : 'قيد الشحن';

                    html += `
                        <div class="glass p-4 rounded-2xl grid grid-cols-4 items-center text-center text-sm">
                            <div class="font-bold">${orderName}</div>
                            <div class="text-neutral-400">${date}</div>
                            <div>
                                <span class="${status === 'قيد الشحن' ? 'text-yellow-500' : 'text-green-500'} font-bold">${status}</span>
                            </div>
                            <div>
                                ${status === 'قيد الشحن' ? `
                                    <button onclick="handleAction('استعجال', '${orderName}')" class="bg-blue-900 px-3 py-1 rounded-lg text-xs">استعجال</button>
                                ` : `
                                    <button onclick="handleAction('تقييم', '${orderName}')" class="bg-purple-900 px-3 py-1 rounded-lg text-xs">⭐ تقييم</button>
                                `}
                            </div>
                        </div>`;
                }
            });
            res.innerHTML = html || '<p class="text-center text-red-500">لا توجد طلبات لهذا اليوزر.</p>';
        } catch (e) {
            res.innerHTML = '<p class="text-center text-red-500">خطأ في قراءة ملف البيانات.</p>';
        }
    }

    function handleAction(type, order) {
        document.getElementById('modalTitle').innerText = 'تأكيد ' + type;
        document.getElementById('modalDesc').innerText = "يرجى كتابة التفاصيل إذا رغبت:";
        document.getElementById('actionModal').style.display = 'flex';
        
        document.getElementById('confirmBtn').onclick = () => {
            const note = document.getElementById('modalNote').value;
            sendDiscord(type, order, note);
        };
    }

    function sendDiscord(type, order, note) {
        const payload = {
            embeds: [{
                title: `🔔 إجراء جديد: ${type}`,
                color: type === 'إلغاء' ? 16711680 : 3447003,
                fields: [
                    { name: "👤 العميل", value: document.getElementById('userInput').value, inline: true },
                    { name: "📦 الطلب", value: order, inline: true },
                    { name: "📝 التفاصيل", value: note || "لا يوجد", inline: false }
                ]
            }]
        };
        fetch(WEBHOOK, {method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'}});
        alert("تم إرسال الطلب للإدارة!");
        closeModal();
    }

    function closeModal() { document.getElementById('actionModal').style.display = 'none'; }
</script>
</body>
</html>
