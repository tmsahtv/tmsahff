<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid #333; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 md:p-10 fade-in">

<div class="max-w-5xl mx-auto">
    <div class="glass p-8 rounded-3xl mb-8 text-center border-b-4 border-pink-600">
        <h1 class="text-4xl font-black">TMSAHFF STORE</h1>
        <p class="text-neutral-400 mt-2">نظام تتبع الطلبات الاحترافي</p>
    </div>

    <div class="glass p-2 rounded-2xl flex gap-2 mb-8">
        <input type="text" id="userInput" placeholder="أدخل اليوزر للبحث..." class="flex-1 bg-transparent p-4 outline-none">
        <button onclick="search()" class="bg-pink-600 px-8 rounded-xl font-bold hover:bg-pink-700 transition">بحث</button>
    </div>

    <div id="results" class="space-y-4"></div>
</div>

<div id="modal" class="modal">
    <div class="glass p-8 rounded-3xl w-96 text-center border border-pink-500/30">
        <h2 id="modalTitle" class="text-xl font-bold mb-4">تأكيد الإجراء</h2>
        <div class="flex gap-2 justify-center">
            <button onclick="hideModal()" class="px-6 py-2 bg-neutral-800 rounded-xl">إلغاء</button>
            <button id="confirmBtn" class="px-6 py-2 bg-pink-600 rounded-xl font-bold">تأكيد</button>
        </div>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const user = document.getElementById('userInput').value.trim().toLowerCase();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '<p class="text-center">جاري البحث...</p>';
        
        try {
            const res = await fetch('data.csv');
            const data = await res.text();
            const rows = data.split('\n');
            let html = `
            <div class="glass p-4 rounded-xl grid grid-cols-5 text-neutral-500 text-sm font-bold text-center">
                <span>الطلب</span><span>السعر</span><span>التاريخ</span><span>الحالة</span><span>إجراء</span>
            </div>`;
            
            let found = false;
            rows.forEach((row, i) => {
                if(i === 0 || !row.toLowerCase().includes(user)) return;
                found = true;
                const cols = row.split(',');
                const isDelivered = row.toLowerCase().includes('delivered');
                
                html += `
                <div class="glass p-5 rounded-2xl grid grid-cols-5 items-center text-center gap-2 hover:border-pink-500/50 transition">
                    <span class="font-bold text-pink-400">${cols[1] || '-'}</span>
                    <span>${cols[3] || '-'}</span>
                    <span class="text-xs text-neutral-400">${cols[5] || '-'}</span>
                    <span class="font-bold ${isDelivered ? 'text-green-500' : 'text-yellow-500'}">
                        ${isDelivered ? '✅ تم' : '⏳ قيد'}
                    </span>
                    <div class="flex gap-1 justify-center">
                        <button onclick="doAction('استعجال', '${cols[1]}')" class="bg-blue-600 px-2 py-1 rounded text-xs">استعجال</button>
                        <button onclick="doAction('تقييم', '${cols[1]}')" class="bg-yellow-600 px-2 py-1 rounded text-xs">⭐</button>
                    </div>
                </div>`;
            });
            resDiv.innerHTML = found ? html : '<p class="text-center text-red-500">لا يوجد بيانات.</p>';
        } catch(e) { resDiv.innerHTML = '<p class="text-center text-red-500">خطأ في الاتصال!</p>'; }
    }

    function doAction(type, order) {
        document.getElementById('modalTitle').innerText = 'تأكيد ' + type;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('confirmBtn').onclick = () => {
            fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: `🔔 ${type} للطلب: ${order}` }) });
            hideModal();
            alert(type === 'تقييم' ? 'شكراً لتقييمك! ⭐' : 'تم الإرسال للإدارة!');
        };
    }
    
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
