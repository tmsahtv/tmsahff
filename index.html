<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TMSAHFF STORE | النظام الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; overflow-x: hidden; }
        .bg-glow { background: radial-gradient(circle at top right, #1d030b, #050505); }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid #333; }
        .kick-live { border: 1px solid #53fc18; box-shadow: 0 0 10px #53fc1866; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(83, 252, 24, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(83, 252, 24, 0); } 100% { box-shadow: 0 0 0 0 rgba(83, 252, 24, 0); } }
    </style>
</head>
<body class="bg-glow min-h-screen p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <div class="glass rounded-3xl p-8 mb-8 text-center border-b-4 border-pink-600">
        <h1 class="text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">TMSAHFF STORE</h1>
        <div class="flex flex-wrap gap-8 justify-center mt-8 text-2xl">
            <a href="https://kick.com/tmsahff" class="kick-live flex items-center gap-2 bg-black px-5 py-2 rounded-full text-[#53fc18]"><i class="fas fa-tv"></i> <span>KICK LIVE</span></a>
            <a href="https://tiktok.com/@tmsahfreefire" class="hover:text-white transition"><i class="fab fa-tiktok"></i></a>
            <a href="https://wa.me/201010247318" class="hover:text-green-500 transition"><i class="fab fa-whatsapp"></i></a>
            <a href="https://instagram.com/tmsahtv" class="hover:text-pink-400 transition"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div class="glass p-6 rounded-2xl flex gap-4 mb-8 border border-neutral-800">
        <input id="userInput" class="flex-1 bg-transparent p-3 outline-none text-white text-lg" placeholder="اكتب اسم اليوزر للبحث...">
        <button onclick="search()" class="bg-pink-600 px-10 py-3 rounded-xl font-black hover:bg-pink-700 transition">بحث</button>
    </div>

    <div class="glass overflow-x-auto rounded-2xl border border-neutral-800">
        <table class="w-full text-right border-collapse">
            <thead>
                <tr class="text-neutral-500 border-b border-neutral-800 text-sm">
                    <th class="p-6">اليوزر</th>
                    <th class="p-6">الطلب</th>
                    <th class="p-6">السعر</th>
                    <th class="p-6">الحالة</th>
                    <th class="p-6">إجراءات</th>
                </tr>
            </thead>
            <tbody id="results"></tbody>
        </table>
    </div>
</div>

<script>
    const WEBHOOK = "https://webhook.lewisakura.moe/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const query = document.getElementById('userInput').value.trim().toLowerCase();
        const res = document.getElementById('results');
        if (!query) return;
        
        try {
            const response = await fetch('data.csv');
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);
            let html = '';

            rows.forEach((row, index) => {
                const cols = row.split(',');
                if (cols.length < 7) return;
                
                const user = cols[0].trim();
                if (user.toLowerCase().includes(query)) {
                    const article = cols[1];
                    const price = cols[3];
                    const status = cols[6]?.trim();

                    html += `
                    <tr class="border-b border-neutral-800 hover:bg-white/5 transition">
                        <td class="p-6 font-bold text-pink-400">${user}</td>
                        <td class="p-6">${article}</td>
                        <td class="p-6 text-yellow-500">${price}</td>
                        <td class="p-6 ${status === 'Delivered' ? 'text-green-500' : 'text-yellow-500'} font-bold">
                            ${status === 'Delivered' ? '✅ تم التوصيل' : '⏳ قيد الشحن'}
                        </td>
                        <td class="p-6">
                            ${status === 'Pending' ? `
                                <button onclick="triggerAction('استعجال', '${user}', '${article}')" class="bg-blue-900/80 px-3 py-1 rounded text-xs mx-1">استعجال</button>
                                <button onclick="triggerAction('إلغاء', '${user}', '${article}')" class="bg-red-900/80 px-3 py-1 rounded text-xs mx-1">إلغاء</button>
                            ` : '---'}
                        </td>
                    </tr>`;
                }
            });
            res.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center text-red-500">لا توجد نتائج</td></tr>';
        } catch (e) { console.error(e); alert("خطأ في قراءة البيانات"); }
    }

    async function triggerAction(type, user, order) {
        const cooldownKey = `cooldown_${user}_${order}`;
        const lastAction = localStorage.getItem(cooldownKey);
        
        if (lastAction && (Date.now() - lastAction < 3600000)) {
            alert("⚠️ لا يمكنك القيام بأكثر من إجراء لهذا الطلب في الساعة الواحدة.");
            return;
        }

        const payload = { embeds: [{ title: `🔔 ${type} مطلوب`, fields: [{ name: "اليوزر", value: user }, { name: "الطلب", value: order }] }] };
        
        const response = await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        
        if (response.ok) {
            localStorage.setItem(cooldownKey, Date.now());
            alert(`✅ تم إرسال طلب ${type} بنجاح!`);
        } else {
            alert("❌ فشل الإرسال، تأكد من اتصال الويب هوك.");
        }
    }
</script>
</body>
</html>
