<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: 'Cairo', sans-serif; }
        .glass { background: rgba(17, 17, 17, 0.9); backdrop-filter: blur(10px); border: 1px solid #333; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 50; }
    </style>
</head>
<body class="p-6">

<div class="max-w-4xl mx-auto glass p-8 rounded-3xl">
    <h1 class="text-3xl font-bold text-center text-pink-500 mb-6">مركز تتبع الطلبات TMSAHFF</h1>
    
    <div class="flex gap-2 mb-8">
        <input type="text" id="userInput" placeholder="اكتب اليوزر للبحث..." class="flex-1 bg-[#1a1a1a] p-4 rounded-xl border border-neutral-700 outline-none focus:border-pink-500 text-white">
        <button onclick="search()" class="bg-pink-600 px-8 rounded-xl font-bold hover:bg-pink-700">بحث</button>
    </div>

    <div id="results" class="space-y-4"></div>
</div>

<div id="actionModal" class="modal flex items-center justify-center">
    <div class="glass p-8 rounded-3xl w-96 text-center shadow-2xl border border-pink-500/20">
        <i id="modalIcon" class="fas fa-question-circle text-4xl text-pink-500 mb-4"></i>
        <h2 id="modalTitle" class="text-xl font-bold mb-4">تأكيد الإجراء</h2>
        <p id="modalDesc" class="text-neutral-400 mb-6"></p>
        <div class="flex gap-2 justify-center">
            <button onclick="closeModal()" class="px-6 py-2 bg-neutral-800 rounded-xl">إلغاء</button>
            <button id="confirmBtn" class="px-6 py-2 bg-pink-600 rounded-xl font-bold">تأكيد</button>
        </div>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const user = document.getElementById('userInput').value.trim().toLowerCase();
        const resDiv = document.getElementById('results');
        const response = await fetch('data.csv');
        const text = await response.text();
        const rows = text.split('\n');
        
        let html = '';
        rows.forEach((row, i) => {
            if(i === 0 || !row.toLowerCase().includes(user)) return;
            const cols = row.split(',');
            // عرض التاريخ والوقت
            const timestamp = cols[5] || '--:--';
            
            html += `<div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-lg">${cols[1]}</h3>
                    <p class="text-xs text-neutral-500">${timestamp}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="openModal('إلغاء', '${cols[1]}')" class="text-red-400 hover:text-red-300 px-3 py-1 text-sm">إلغاء</button>
                    <button onclick="openModal('استعجال', '${cols[1]}')" class="text-blue-400 hover:text-blue-300 px-3 py-1 text-sm">استعجال</button>
                    <button onclick="rateOrder('${cols[1]}')" class="text-yellow-400"><i class="fas fa-star"></i></button>
                </div>
            </div>`;
        });
        resDiv.innerHTML = html || '<p class="text-center text-red-500">لا يوجد طلبات لهذا الاسم</p>';
    }

    function openModal(type, order) {
        document.getElementById('modalTitle').innerText = 'تأكيد ' + type;
        document.getElementById('modalDesc').innerText = 'هل أنت متأكد من رغبتك في تنفيذ إجراء "' + type + '" للطلب رقم ' + order + '؟';
        document.getElementById('confirmBtn').onclick = () => { notify(type, order); closeModal(); };
        document.getElementById('actionModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

    function rateOrder(order) {
        alert('شكراً لتقييمك للطلب ' + order + '، نحن نقدر دعمك! ⭐');
    }

    function notify(type, order) {
        fetch(WEBHOOK, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: `🔔 إجراء: ${type}\n📦 الطلب: ${order}\n👤 العميل: ${document.getElementById('userInput').value}` })
        }).then(() => alert('تم إرسال طلبك للإدارة بنجاح!'));
    }
</script>
</body>
</html>
