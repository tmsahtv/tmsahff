<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TMSAHFF STORE | النظام الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(12px); border: 1px solid #333; }
        .modal { display: none; position: fixed; inset: 0; background: #000d; z-index: 50; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-5xl mx-auto">
    <div class="glass p-6 rounded-2xl flex gap-2 mb-8">
        <input id="userInput" class="flex-1 bg-transparent p-3 outline-none" placeholder="أدخل اليوزر للبحث عن طلباتك...">
        <button onclick="search()" class="bg-pink-600 px-8 rounded-xl font-bold">بحث</button>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-right border-collapse">
            <thead>
                <tr class="text-neutral-500 border-b border-neutral-800">
                    <th class="p-4">الطلب</th>
                    <th class="p-4">الايدي/النص</th>
                    <th class="p-4">التكلفة</th>
                    <th class="p-4">الحالة</th>
                    <th class="p-4">إجراءات</th>
                </tr>
            </thead>
            <tbody id="results"></tbody>
        </table>
    </div>
</div>

<div id="actionModal" class="modal">
    <div class="glass p-6 rounded-3xl w-96 border border-pink-500/30">
        <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
        <p id="modalDesc" class="text-sm text-neutral-400 mb-4"></p>
        <textarea id="modalNote" class="hidden w-full h-20 bg-neutral-900 p-2 rounded-lg border border-neutral-700 outline-none mb-4" placeholder="اكتب التفاصيل هنا..."></textarea>
        <div class="flex gap-2">
            <button onclick="closeModal()" class="flex-1 py-2 bg-neutral-800 rounded-xl">إلغاء</button>
            <button id="confirmBtn" class="flex-1 py-2 bg-pink-600 rounded-xl font-bold">تأكيد</button>
        </div>
    </div>
</div>

<script>
    async function search() {
        const user = document.getElementById('userInput').value.trim();
        const res = document.getElementById('results');
        if (!user) return;
        
        try {
            const response = await fetch('data.csv');
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);
            let html = '';

            rows.forEach(row => {
                const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                if (cols && cols[0].replace(/"/g, '').trim().toLowerCase() === user.toLowerCase()) {
                    const article = cols[1]?.replace(/"/g, '');
                    const message = cols[2]?.replace(/"/g, '');
                    const price = `${cols[3]} ${cols[4]}`;
                    const statusRaw = cols[6]?.trim();
                    const status = statusRaw === 'Delivered' ? '✅ تم التوصيل' : '⏳ قيد الشحن';

                    html += `
                    <tr class="border-b border-neutral-800">
                        <td class="p-4 font-bold">${article}</td>
                        <td class="p-4 text-sm text-neutral-400">${message}</td>
                        <td class="p-4">${price}</td>
                        <td class="p-4 ${statusRaw === 'Delivered' ? 'text-green-500' : 'text-yellow-500'}">${status}</td>
                        <td class="p-4 flex gap-2">
                            ${statusRaw === 'Pending' ? `
                                <button onclick="openModal('استعجال', '${article}')" class="bg-blue-900 px-3 py-1 rounded text-xs">استعجال</button>
                                <button onclick="openModal('تعديل', '${article}')" class="bg-yellow-700 px-3 py-1 rounded text-xs">تعديل</button>
                                <button onclick="openModal('إلغاء', '${article}')" class="bg-red-900 px-3 py-1 rounded text-xs">إلغاء</button>
                            ` : `<button onclick="sendAction('تقييم', '${article}', 'تم التقييم')" class="bg-purple-900 px-3 py-1 rounded text-xs">⭐ تقييم</button>`}
                        </td>
                    </tr>`;
                }
            });
            res.innerHTML = html || '<tr><td colspan="5" class="text-center p-4">لا توجد طلبات</td></tr>';
        } catch (e) { alert("خطأ في تحميل البيانات"); }
    }

    function openModal(type, order) {
        document.getElementById('modalTitle').innerText = 'تأكيد: ' + type;
        const noteArea = document.getElementById('modalNote');
        
        if (type === 'إلغاء') {
            document.getElementById('modalDesc').innerText = "هل تود الإلغاء وارجاع نقاطك؟";
            noteArea.classList.add('hidden');
        } else if (type === 'تعديل') {
            document.getElementById('modalDesc').innerText = "اكتب سبب التعديل والتفاصيل الجديدة:";
            noteArea.classList.remove('hidden');
        } else {
            document.getElementById('modalDesc').innerText = "تأكيد طلب " + type + "؟";
            noteArea.classList.add('hidden');
        }
        
        document.getElementById('actionModal').style.display = 'flex';
        document.getElementById('confirmBtn').onclick = () => sendAction(type, order, noteArea.value);
    }

    function sendAction(type, order, note) {
        // هنا يتم إرسال البيانات للديسكورد عبر Webhook
        console.log(`Sending to Discord: ${type} - ${order} - ${note}`);
        alert("تم إرسال " + type + " بنجاح!");
        closeModal();
    }

    function closeModal() { document.getElementById('actionModal').style.display = 'none'; }
</script>
</body>
</html>
